<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AICrew Studio complete architecture</title>
  <desc id="desc">Layered architecture for client, API, orchestration, workers, model fabric, data plane, and observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#be123c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .cn { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
      .title { fill: #0f172a; font-size: 36px; font-weight: 850; letter-spacing: 0; }
      .subtitle { fill: #475569; font-size: 17px; }
      .layer { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .head { fill: #0f172a; font-size: 17px; font-weight: 800; }
      .text { fill: #334155; font-size: 13px; }
      .pillText { fill: #0f172a; font-size: 12px; font-weight: 700; }
      .arrow { stroke: #0284c7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .mutedArrow { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 7; fill: none; marker-end: url(#arrowMuted); }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#0284c7"/>
    </marker>
    <marker id="arrowMuted" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="12" fill="url(#bar)"/>

  <g class="cn">
    <text x="60" y="62" class="title">AICrew Studio 完整架构</text>
    <text x="60" y="94" class="subtitle">从用户创作入口到 Agent Runtime、模型路由、资产/计费/观测的端到端边界</text>

    <g filter="url(#shadow)">
      <rect x="55" y="125" width="1090" height="70" rx="18" class="layer"/>
      <rect x="55" y="215" width="1090" height="82" rx="18" class="layer"/>
      <rect x="55" y="322" width="1090" height="105" rx="18" class="layer"/>
      <rect x="55" y="452" width="1090" height="86" rx="18" class="layer"/>
      <rect x="55" y="563" width="1090" height="86" rx="18" class="layer"/>
    </g>

    <text x="80" y="153" class="head">Client Experience</text>
    <rect x="275" y="140" width="130" height="34" rx="17" fill="#ccfbf1"/>
    <text x="298" y="162" class="pillText">Web App</text>
    <rect x="425" y="140" width="130" height="34" rx="17" fill="#dbeafe"/>
    <text x="443" y="162" class="pillText">Mobile App</text>
    <rect x="575" y="140" width="150" height="34" rx="17" fill="#fee2e2"/>
    <text x="595" y="162" class="pillText">Creative Editor</text>
    <rect x="745" y="140" width="150" height="34" rx="17" fill="#fef3c7"/>
    <text x="769" y="162" class="pillText">Export Center</text>
    <text x="920" y="162" class="text">SSE/WebSocket progress, preview, version compare</text>

    <text x="80" y="245" class="head">API & Domain Services</text>
    <rect x="275" y="233" width="118" height="32" rx="16" fill="#e0f2fe"/>
    <text x="302" y="254" class="pillText">Gateway</text>
    <rect x="410" y="233" width="118" height="32" rx="16" fill="#f1f5f9"/>
    <text x="446" y="254" class="pillText">Auth</text>
    <rect x="545" y="233" width="118" height="32" rx="16" fill="#f1f5f9"/>
    <text x="572" y="254" class="pillText">Project</text>
    <rect x="680" y="233" width="118" height="32" rx="16" fill="#f1f5f9"/>
    <text x="710" y="254" class="pillText">Asset</text>
    <rect x="815" y="233" width="118" height="32" rx="16" fill="#f1f5f9"/>
    <text x="844" y="254" class="pillText">Billing</text>
    <rect x="950" y="233" width="118" height="32" rx="16" fill="#f1f5f9"/>
    <text x="981" y="254" class="pillText">Admin</text>
    <text x="275" y="284" class="text">REST/GraphQL for durable resources; SSE endpoint for creative task progress.</text>

    <text x="80" y="355" class="head">Agent Orchestration Layer</text>
    <rect x="275" y="344" width="170" height="34" rx="17" fill="#ccfbf1"/>
    <text x="295" y="366" class="pillText">Orchestrator</text>
    <rect x="465" y="344" width="170" height="34" rx="17" fill="#dbeafe"/>
    <text x="490" y="366" class="pillText">Workflow DAG</text>
    <rect x="655" y="344" width="170" height="34" rx="17" fill="#fef3c7"/>
    <text x="681" y="366" class="pillText">Skill Engine</text>
    <rect x="845" y="344" width="170" height="34" rx="17" fill="#fee2e2"/>
    <text x="873" y="366" class="pillText">Policy Guard</text>
    <rect x="275" y="393" width="118" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="299" y="412" class="pillText">Brief</text>
    <rect x="410" y="393" width="118" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="431" y="412" class="pillText">Strategy</text>
    <rect x="545" y="393" width="118" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="570" y="412" class="pillText">Script</text>
    <rect x="680" y="393" width="118" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="699" y="412" class="pillText">Visual</text>
    <rect x="815" y="393" width="118" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="838" y="412" class="pillText">Video</text>
    <rect x="950" y="393" width="118" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="976" y="412" class="pillText">QA</text>

    <text x="80" y="483" class="head">Execution & Model Fabric</text>
    <rect x="275" y="472" width="150" height="32" rx="16" fill="#f1f5f9"/>
    <text x="297" y="493" class="pillText">Queue/Workers</text>
    <rect x="445" y="472" width="150" height="32" rx="16" fill="#e0f2fe"/>
    <text x="468" y="493" class="pillText">Model Router</text>
    <rect x="615" y="472" width="118" height="32" rx="16" fill="#ccfbf1"/>
    <text x="650" y="493" class="pillText">LLM</text>
    <rect x="750" y="472" width="118" height="32" rx="16" fill="#fef3c7"/>
    <text x="781" y="493" class="pillText">Image</text>
    <rect x="885" y="472" width="118" height="32" rx="16" fill="#fee2e2"/>
    <text x="915" y="493" class="pillText">Video</text>
    <rect x="1020" y="472" width="90" height="32" rx="16" fill="#ede9fe"/>
    <text x="1048" y="493" class="pillText">Audio</text>
    <text x="275" y="525" class="text">Retries, fallback provider, budget cap, moderation before export.</text>

    <text x="80" y="595" class="head">Data, Cost, Observability</text>
    <rect x="275" y="584" width="130" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="307" y="605" class="pillText">Postgres</text>
    <rect x="425" y="584" width="130" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="463" y="605" class="pillText">Redis</text>
    <rect x="575" y="584" width="130" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="603" y="605" class="pillText">Object Store</text>
    <rect x="725" y="584" width="130" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="755" y="605" class="pillText">Vector DB</text>
    <rect x="875" y="584" width="130" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="905" y="605" class="pillText">Trace/Eval</text>
    <rect x="1025" y="584" width="90" height="32" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1043" y="605" class="pillText">Ledger</text>
    <text x="275" y="637" class="text">All generated assets, task events, cost transactions, and QA results are durable and replayable.</text>

    <path d="M600 195 L600 215" class="arrow"/>
    <path d="M600 297 L600 322" class="arrow"/>
    <path d="M600 427 L600 452" class="arrow"/>
    <path d="M600 538 L600 563" class="arrow"/>
    <path d="M1035 269 C1110 315 1110 470 1015 584" class="mutedArrow"/>
  </g>
</svg>
