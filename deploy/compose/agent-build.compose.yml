services:
  agent-build-site:
    image: ${AGENT_BUILD_SITE_IMAGE}
    container_name: agent-build-site
    restart: unless-stopped
    environment:
      AGENT_BUILD_BASE_PATH: ${AGENT_BUILD_BASE_PATH:-/agent-build/}
    ports:
      - "127.0.0.1:${AGENT_BUILD_SITE_PORT:-8088}:8080"
    depends_on:
      - agent-build-runner
      - agent-build-content-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent-build-runner:
    image: ${AGENT_BUILD_RUNTIME_IMAGE}
    container_name: agent-build-runner
    restart: unless-stopped
    command: ["pnpm", "run", "demo:server:prod"]
    env_file:
      - ./agent-build.runtime.env
    environment:
      NODE_ENV: production
      DEMO_RUNNER_PORT: "5174"
      DEMO_RUNNER_ALLOWED_HOSTS: ${AGENT_BUILD_DOMAIN:-songuu.top}
      DEMO_RUNNER_ALLOWED_ORIGINS: ${AGENT_BUILD_ALLOWED_ORIGINS:-https://songuu.top}
      DEMO_RUNNER_ALLOW_MISSING_ORIGIN: "1"
      DEMO_RUNNER_REQUIRE_TOKEN: "0"
    expose:
      - "5174"

  # Read-only data boundary for the static site. It remains healthy while disabled
  # so legacy Supabase-only deployments do not need a special Compose profile.
  agent-build-content-api:
    image: ${AGENT_BUILD_RUNTIME_IMAGE}
    container_name: agent-build-content-api
    restart: unless-stopped
    command: ["pnpm", "run", "content:api:prod"]
    env_file:
      - ./agent-build.runtime.env
    environment:
      NODE_ENV: production
      CONTENT_API_HOST: "0.0.0.0"
      CONTENT_API_PORT: "5180"
      CONTENT_API_ALLOWED_HOSTS: ${AGENT_BUILD_DOMAIN:-songuu.top}
      CONTENT_API_ALLOWED_ORIGINS: ${AGENT_BUILD_ALLOWED_ORIGINS:-https://songuu.top}
      CONTENT_API_ALLOW_MISSING_ORIGIN: "1"
    expose:
      - "5180"
  news-collector:
    image: ${AGENT_BUILD_RUNTIME_IMAGE}
    container_name: agent-build-news-collector
    profiles: ["jobs"]
    restart: unless-stopped
    command: ["node", "--dns-result-order=ipv4first", "node_modules/tsx/dist/cli.mjs", "news-collector/src/cron.ts"]
    env_file:
      - ./agent-build.runtime.env
    environment:
      NODE_ENV: production

  notion-cron:
    image: ${AGENT_BUILD_RUNTIME_IMAGE}
    container_name: agent-build-notion-cron
    profiles: ["jobs", "notion"]
    restart: unless-stopped
    command: ["node", "--dns-result-order=ipv4first", "node_modules/tsx/dist/cli.mjs", "news-collector/src/notion/cron.ts"]
    env_file:
      - ./agent-build.runtime.env
    environment:
      NODE_ENV: production
